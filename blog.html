<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | SORA - HAIR & EYELASH -</title>
    <meta name="description" content="SORA - HAIR & EYELASH - のブログ。サロンの日常やビフォーアフターをInstagramで発信しています。">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="site-header" class="site-header"></header>

    <section class="page-header">
        <div class="page-header-inner">
            <span class="section-label">Blog</span>
            <h1>サロンブログ</h1>
        </div>
    </section>

    <section class="blog-section">
        <div class="container">
            <div class="section-header">
                <span class="section-label">Instagram</span>
                <h2 class="section-title">SORAの日常</h2>
                <p class="section-lead">
                    施術のビフォーアフター、サロンのお知らせ、海辺の風景。<br>
                    Instagramで日々更新しています。
                </p>
            </div>

            <!--
                Instagram埋込ガイド:
                data-instgrm-permalink に投稿URL（例: https://www.instagram.com/p/XXXXX/ ）を貼るだけで
                自動的にInstagramのカードがレンダリングされます。
                投稿を増やしたい場合はblockquoteを複製してURLを差し替えてください。
            -->
            <div class="ig-grid">
                <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DW_8ypbErqf/" data-instgrm-version="14"></blockquote>
                <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DNFy3JHSBhD/" data-instgrm-version="14"></blockquote>
                <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DJ-unkwSjW2/" data-instgrm-version="14"></blockquote>
            </div>

            <div class="ig-profile-link">
                <p style="color: var(--gray-700); margin-bottom: 1.5rem;">
                    最新の投稿はInstagramでご覧ください。
                </p>
                <a href="https://www.instagram.com/sora_hair_eyelashsalon/" target="_blank" rel="noopener" class="btn btn-primary">
                    @sora_hair_eyelashsalon
                </a>
            </div>
        </div>
    </section>

    <section class="reserve-banner">
        <div class="container reserve-banner-inner">
            <h2 class="reserve-title">気になるメニューはありましたか？</h2>
            <p class="reserve-sub">ご予約・ご相談はお気軽に。</p>
            <div class="reserve-buttons">
                <a href="https://book.squareup.com/appointments/4f4hl9wpoa72f8/location/L40TADZ6SDMNC/services" target="_blank" rel="noopener" class="btn btn-primary">Square予約</a>
                <a href="https://lin.ee/OPEYoHK" target="_blank" rel="noopener" class="btn btn-line">LINE公式</a>
            </div>
        </div>
    </section>

    <footer id="site-footer" class="site-footer"></footer>
    <script src="main.js"></script>
    <script async src="//www.instagram.com/embed.js"></script>
</body>
</html>
